services:
  # 1. Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # 2. WhatsApp Gateway (Evolution v2 + Redis + Postgres)
  evolution_api:
    image: atendai/evolution-api:v2.2.2
    container_name: evolution_api
    restart: always
    depends_on:
      - redis
      - postgres
    environment:
      - SERVER_URL=${EVOLUTION_PUBLIC_URL}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      
      # Database
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      - DATABASE_CLIENT_NAME=evolution_bot
      
      # Redis
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

  redis:
    image: redis:alpine
    container_name: evolution_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data

  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data

  # 3. Backend .NET
  backend_api:
    image: ${GHCR_IMAGE_BACKEND}:latest
    container_name: backend_api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDB__ConnectionString=${MONGO_CONNECTION_STRING}
      - MongoDB__DatabaseName=${DB_NAME}
      - EvolutionAPI__BaseUrl=http://evolution_api:8080
      - EvolutionAPI__ApiKey=${EVOLUTION_API_KEY}
      - JWT__Key=${JWT_SECRET}
      - JWT__Issuer=${JWT_ISSUER}
      - JWT__Audience=${JWT_AUDIENCE}
    depends_on:
      - evolution_api

  # 4. Frontend
  frontend:
    image: ${GHCR_IMAGE_FRONTEND}:latest
    container_name: frontend_app
    restart: always

volumes:
  evolution_instances:
  evolution_store:
  evolution_redis_data:
  evolution_pg_data:
  caddy_data:
  caddy_config:
